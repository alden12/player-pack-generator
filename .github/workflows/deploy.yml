name: Deploy

on:
  push:
    branches: [master]
  # Manual fallback: run a deploy on demand from the Actions tab.
  workflow_dispatch:

# Allow pushing the version bump back (contents) and deploying to Pages.
permissions:
  contents: write
  pages: write
  id-token: write

# Never run two deployments at once.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # Bump the patch version (in-memory only for now). It is read into the
      # build below and committed back after a successful deploy.
      - name: Bump patch version
        run: npm version patch --no-git-tag-version

      - name: Build
        run: yarn build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4

      # Only persist the version bump once the deploy has succeeded. [skip ci]
      # keeps this commit from re-triggering any workflow.
      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          version=$(node -p "require('./package.json').version")
          git commit -am "chore: release v${version} [skip ci]"
          git push
